
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; }
#ui { color: #fff; text-align: center; margin-bottom: 12px; }
#score { font-size: 22px; font-weight: bold; letter-spacing: 4px; }
#best { font-size: 13px; color: #555; margin-top: 4px; letter-spacing: 2px; }
#msg { font-size: 12px; color: #444; margin-top: 6px; letter-spacing: 1px; }
canvas { border: 1px solid #222; display: block; touch-action: none; }

/* D-PAD CONTROLS */
#dpad {
  display: grid;
  grid-template-areas:
    ". up ."
    "left . right"
    ". down .";
  grid-template-columns: 60px 60px 60px;
  grid-template-rows: 60px 60px 60px;
  gap: 6px;
  margin-top: 18px;
}
.dpad-btn {
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 10px;
  color: #fff;
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  -webkit-user-select: none;
  transition: background 0.1s;
  touch-action: manipulation;
}
.dpad-btn:active { background: #333; }
#btn-up    { grid-area: up; }
#btn-left  { grid-area: left; }
#btn-right { grid-area: right; }
#btn-down  { grid-area: down; }
</style>

<div id="ui">
  <div id="score">SCORE: 0</div>
  <div id="best">BEST: 0</div>
  <div id="msg">ARROW KEYS / WASD / SWIPE / D-PAD</div>
</div>
<canvas id="c"></canvas>

<!-- D-PAD BUTTONS -->
<div id="dpad">
  <button class="dpad-btn" id="btn-up">▲</button>
  <button class="dpad-btn" id="btn-left">◀</button>
  <button class="dpad-btn" id="btn-right">▶</button>
  <button class="dpad-btn" id="btn-down">▼</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const CELL = 20, COLS = 20, ROWS = 20;
canvas.width = CELL * COLS;
canvas.height = CELL * ROWS;

let snake, dir, nextDir, food, score, best, gameOver, started, interval;
best = 0;

function init() {
  snake = [{x:10, y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1, y:0};
  nextDir = {x:1, y:0};
  food = spawnFood();
  score = 0;
  gameOver = false;
  started = false;
  document.getElementById('score').textContent = 'SCORE: 0';
  if (interval) clearInterval(interval);
  interval = setInterval(loop, 120);
}

function spawnFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(s => s.x===pos.x && s.y===pos.y));
  return pos;
}

function applyDir(d) {
  if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
  if (!started) started = true;
}

// KEYBOARD
document.addEventListener('keydown', e => {
  const map = {
    ArrowUp:{x:0,y:-1}, KeyW:{x:0,y:-1},
    ArrowDown:{x:0,y:1}, KeyS:{x:0,y:1},
    ArrowLeft:{x:-1,y:0}, KeyA:{x:-1,y:0},
    ArrowRight:{x:1,y:0}, KeyD:{x:1,y:0}
  };
  if (map[e.code]) {
    applyDir(map[e.code]);
    e.preventDefault();
  }
  if (gameOver && e.code === 'Space') init();
});

// CLICK TO START / RESTART
canvas.addEventListener('click', () => { if (gameOver) init(); if (!started) started = true; });

// D-PAD BUTTONS
function addDpadBtn(id, d) {
  const btn = document.getElementById(id);
  btn.addEventListener('touchstart', e => { e.preventDefault(); applyDir(d); if (gameOver) init(); }, { passive: false });
  btn.addEventListener('mousedown', e => { applyDir(d); if (gameOver) init(); });
}
addDpadBtn('btn-up',    {x:0,  y:-1});
addDpadBtn('btn-down',  {x:0,  y:1});
addDpadBtn('btn-left',  {x:-1, y:0});
addDpadBtn('btn-right', {x:1,  y:0});

// SWIPE DETECTION
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const absDx = Math.abs(dx);
  const absDy = Math.abs(dy);

  // Only register as swipe if moved more than 20px
  if (Math.max(absDx, absDy) < 20) {
    if (gameOver) init();
    if (!started) started = true;
    return;
  }

  if (absDx > absDy) {
    applyDir(dx > 0 ? {x:1, y:0} : {x:-1, y:0});
  } else {
    applyDir(dy > 0 ? {x:0, y:1} : {x:0, y:-1});
  }
  e.preventDefault();
}, { passive: false });

function loop() {
  if (!started || gameOver) { draw(); return; }
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || snake.some(s => s.x===head.x && s.y===head.y)) {
    gameOver = true;
    if (score > best) best = score;
    document.getElementById('best').textContent = 'BEST: ' + best;
    draw();
    return;
  }

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById('score').textContent = 'SCORE: ' + score;
    food = spawnFood();
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      ctx.strokeStyle = '#111';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x*CELL, y*CELL, CELL, CELL);
    }
  }

  snake.forEach((s, i) => {
    const ratio = i / snake.length;
    const shade = Math.floor(255 - ratio * 180);
    ctx.fillStyle = `rgb(${shade},${shade},${shade})`;
    ctx.beginPath();
    ctx.roundRect(s.x*CELL+2, s.y*CELL+2, CELL-4, CELL-4, 4);
    ctx.fill();
    if (i === 0) {
      ctx.fillStyle = '#0a0a0a';
      const ex = dir.x, ey = dir.y;
      const ex2 = ey, ey2 = -ex;
      ctx.beginPath();
      ctx.arc(s.x*CELL + CELL/2 + ex*4 + ex2*4, s.y*CELL + CELL/2 + ey*4 + ey2*4, 2, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s.x*CELL + CELL/2 + ex*4 - ex2*4, s.y*CELL + CELL/2 + ey*4 - ey2*4, 2, 0, Math.PI*2);
      ctx.fill();
    }
  });

  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(food.x*CELL + CELL/2, food.y*CELL + CELL/2, CELL/2 - 4, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  if (!started) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SNAKE', canvas.width/2, canvas.height/2 - 30);
    ctx.fillStyle = '#555';
    ctx.font = '13px monospace';
    ctx.fillText('press any key or swipe to start', canvas.width/2, canvas.height/2 + 10);
    ctx.textAlign = 'left';
  }

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 26px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 40);
    ctx.fillStyle = '#888';
    ctx.font = '16px monospace';
    ctx.fillText('SCORE: ' + score, canvas.width/2, canvas.height/2);
    ctx.fillStyle = '#444';
    ctx.font = '13px monospace';
    ctx.fillText('SPACE / TAP / D-PAD to restart', canvas.width/2, canvas.height/2 + 35);
    ctx.textAlign = 'left';
  }
}

init();
</script>
